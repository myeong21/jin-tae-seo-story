<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진태서 스토리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
    <header>
        <h1>진태서 스토리 (JIN_TAE_SEO_STORY)</h1>
    </header>

    <div id="game-container">
        <div id="main-panel">
            <div id="map-shell">
                <div id="map-world">
                    <img id="map-img" alt="map">
                    <div id="player"></div>
                </div>
                <div id="map-overlay"></div>
            </div>

            <div id="dialogue">
                <div id="dialogue-inner">
                    <div id="speaker"></div>
                    <div id="text"></div>
                    <div id="dialogue-next">▼</div>
                </div>
            </div>
        </div>

        <aside id="sidebar">
            <section>
                <h2>현재 위치</h2>
                <p id="location">학교</p>
            </section>

            <section>
                <h2>진행도</h2>
                <ul id="progress-list">
                    <li id="progress0">?????</li>
                    <li id="progress1">?????</li>
                    <li id="progress2">?????</li>
                    <li id="progress3">?????</li>
                </ul>
            </section>

            <section>
                <h2>인벤토리</h2>
                <div class="inventory"></div>
            </section>
        </aside>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
