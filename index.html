<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>진태서 스토리</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

    <div id="game-container">
        <div id="main-panel">
            <div id="map-shell">
                <div id="map-stage">

                    <div id="player"></div>

                    <div class="zone" id="zone1"></div>
                    <div class="zone" id="zone2"></div>
                    <div class="zone" id="zone3"></div>
                    <div class="zone" id="zone4"></div>

                <div id="speaker">진태서</div>
                <div id="text">게임을 시작하세요.</div>
            </div>
        </div>

        <aside id="sidebar">
            <section>
                <h2>현재 위치</h2>
                <p id="location">학교</p>
            </section>

            <section>
                <h2>진행도</h2>
                <ul>
                    <li>?????</li>
                    <li>?????</li>
                    <li>?????</li>
                    <li>?????</li>
                </ul>
            </section>

            <section>
                <h2>인벤토리</h2>

        </aside>
    </div>
</div>

</html>
